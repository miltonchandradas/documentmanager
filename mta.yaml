_schema-version: "3.1"
ID: documentmanager
version: 1.0.0
description: Document Manager CAP Application

parameters:
  enable-parallel-deployments: true

build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm ci
        - npx cds build --production

modules:
  - name: documentmanager-srv
    type: nodejs
    path: gen/srv
    parameters:
      buildpack: nodejs_buildpack
      memory: 256M
    build-parameters:
      builder: npm
    provides:
      - name: srv-api
        properties:
          srv-url: ${default-url}
    requires:
      - name: dms-integration
      - name: documentmanager-destination
      - name: documentmanager-connectivity

resources:
  - name: dms-integration
    type: org.cloudfoundry.existing-service
    parameters:
      service-name: dms-integration

  - name: documentmanager-destination
    type: org.cloudfoundry.managed-service
    parameters:
      service: destination
      service-plan: lite

  - name: documentmanager-connectivity
    type: org.cloudfoundry.managed-service
    parameters:
      service: connectivity
      service-plan: lite
